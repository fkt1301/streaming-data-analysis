[project]
name = "streaming-common"
version = "0.1.0"
description = "Shared logging, config, and schema utilities used by every service in the pipeline"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/streaming_common"]
